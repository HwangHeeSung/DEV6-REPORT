server:
  port: ${PORT:8080}
  address: 0.0.0.0

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration/postgresql
    baseline-on-migrate: true

logging:
  level:
    com.bridgetec.dev6report: INFO
    org.flywaydb: INFO
